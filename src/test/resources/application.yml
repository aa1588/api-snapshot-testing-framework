spring:
  main:
    banner-mode: off
    log-startup-info: false

  security:
    user:
      name: test-user
      password: test-secret

logging:
  level:
    root: OFF
    com.aiig.demo_app.ApiSnapshotTest: INFO

# Snapshot testing environment configuration
snapshot:
  environments:
    # Baseline environment (old system - used when capturing snapshots)
    baseline:
      url: http://localhost:8080
      username: api-user
      password: api-secret
    # Current environment (new system - used when verifying)
    current:
      url: http://localhost:8080
      username: api-user
      password: api-secret
