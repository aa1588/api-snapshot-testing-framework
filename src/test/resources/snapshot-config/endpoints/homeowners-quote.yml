# Homeowners Quote Endpoint Configuration
# ========================================
# This file configures snapshot testing for the homeowners quote endpoint.
#
# To modify masking rules:
# 1. Edit only this file (not global.yml or Java code)
# 2. Run tests with -Dsnapshot.update=true to regenerate snapshots
# 3. Commit both this file and the updated snapshot

endpoint:
  key: homeowners-quote
  method: POST
  url: /api/v1/quotes/homeowners
  requestFile: requests/homeowners-quote.json
  description: Creates a new homeowners insurance quote

# Endpoint-specific masking rules
# These are ADDED to the global rules, not replacing them.
masking:
  paths:
    # Quote identifiers
    - $.quote.quoteId
    - $.quote.quoteNumber
    - $.quote.expiresAt

    # Customer identifiers
    - $.quote.customer.customerId
    - $.quote.customer.creditInfo.lastChecked

    # Property identifiers
    - $.quote.property.propertyId
    - $.quote.property.valuation.valuationId
    - $.quote.property.valuation.valuationDate

    # Coverage identifiers (all items in array)
    - $.quote.coverages[*].coverageId
    - $.quote.coverages[*].subCoverages[*].subCoverageId

    # Discount identifiers (all items in array)
    - $.quote.discounts[*].discountId
    - $.quote.discounts[*].appliedAt
