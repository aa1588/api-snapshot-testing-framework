# Dwelling Quote Endpoint Configuration
# ======================================
# This file configures snapshot testing for the INOW dwelling quote endpoint.
#
# To modify masking rules:
# 1. Edit only this file (not global.yml or Java code)
# 2. Run tests with -Dsnapshot.update=true to regenerate snapshots
# 3. Commit both this file and the updated snapshot

endpoint:
  key: dwelling-quote
  method: POST
  url: /api/v1/quotes/dwelling
  requestFile: requests/dwelling-quote.json
  description: Creates a new dwelling insurance quote via INOW integration

# Endpoint-specific masking rules
# These are ADDED to the global rules, not replacing them.
# Note: Common fields like $..id, $..SystemId, $..AddDt, $..UpdateDt are already
# handled in global.yml using recursive patterns.
masking:
  paths:
    # Quote-level identifiers
    - $.quoteResponse.quoteNumber
    - $.quoteResponse.spinUrl

    # Application-level identifiers
    - $.quoteResponse.dtoApplication.AppNumber
    - $.quoteResponse.dtoApplication.QuoteNumber

    # Policy identifiers
    - $.quoteResponse.dtoApplication.DTOBasicPolicy[*].PolicyNumber
    - $.quoteResponse.dtoApplication.DTOBasicPolicy[*].QuoteNumber

    # Line-level identifiers
    - $.quoteResponse.dtoApplication.DTOLine[*].LineNumber
    - $.quoteResponse.dtoApplication.DTOLine[*].DTORisk[*].RiskNumber

    # Building identifiers
    - $.quoteResponse.dtoApplication.DTOLine[*].DTORisk[*].DTOBuilding[*].BuildingNumber
    - $.quoteResponse.dtoApplication.DTOLine[*].DTORisk[*].DTOBuilding[*].LocationNumber

    # Insured identifiers
    - $.quoteResponse.dtoApplication.DTOInsured[*].InsuredNumber
    - $.quoteResponse.dtoApplication.DTOInsured[*].PartyNumber

    # Address identifiers
    - $.quoteResponse.dtoApplication.DTOInsured[*].Addr[*].AddrNumber

    # Coverage identifiers
    - $.quoteResponse.dtoApplication.DTOLine[*].DTORisk[*].DTOBuilding[*].DTOCoverage[*].CoverageNumber
    - $.quoteResponse.dtoApplication.DTOLine[*].DTORisk[*].DTOCoverage[*].CoverageNumber

    # Transaction and reference numbers
    - $.quoteResponse.dtoApplication.TransactionNumber
    - $.quoteResponse.dtoApplication.TransactionRef
    - $.quoteResponse.dtoApplication.VersionNumber

    # Session and security tokens (if present in spinUrl or elsewhere)
    - $.quoteResponse.sessionId
    - $.quoteResponse.securityToken
