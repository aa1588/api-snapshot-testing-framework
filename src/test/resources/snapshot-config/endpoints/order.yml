# Order API Endpoint Configuration

endpoint:
  key: order
  description: "Create order - demonstrates dynamic field masking"
  method: POST
  url: /api/demo/order
  requestFile: requests/order.json

masking:
  paths:
    - $.orderId
    - $.createdAt
    - $.processedAt
    - $.metadata.requestId
    - $.metadata.serverNode
    - $.metadata.callbackUrl
    - $.items[*].processedAt
